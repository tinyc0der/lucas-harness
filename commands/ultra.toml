description = "Route any incoming ticket to its correctly-calibrated flow — classify the ticket type (Feature, Bug, Migration, Incident, Spike, Chore, …), then dispatch existing commands, stopping for a human only at critical gates."

prompt = """
`/ultra` is a **router**, not a new workflow. It reads the ticket in the arguments, classifies it, sets up the work, then dispatches the existing commands and skills in the calibration that fits that ticket type. It adds no new mechanics — every step below is an existing `/command` or skill. The win is picking the right flow and skipping the steps that type doesn't need, while still stopping for a human at the genuinely critical gates.

## Step 0 — Intake (what kind of input is this?)

The argument may be a scoped ticket or a raw description of intent. Decide which before classifying:

- Non-actionable — a question, duplicate, missing detail needed to act, or won't-fix/out-of-scope item → don't force it into a flow; answer it, ask for the missing detail, or recommend closing it, then stop.
- Raw intent — a goal, wish, or problem statement that isn't yet a concrete change ("make onboarding smoother", "we should support SSO") → run the Define phase first: the interview-me skill for a broad/fuzzy goal (→ `docs/intent/<topic>.md`) or the idea-refine skill for a rough but bounded idea (→ `docs/ideas/<idea>.md`). Then re-enter at Step 1 to classify the sharpened result, and carry a `Source:` link to the Define artifact onto whatever spec/guide it produces (provenance).
- Scoped change — already concrete enough to name the work → go straight to Step 1.

Don't over-trigger Define: most natural-language descriptions ("the dashboard feels slow" → a perf Improvement) are concrete enough to classify directly. Refine first only when the input is genuinely too broad (spans multiple features) or too fuzzy (a wish with no concrete change in mind) to classify with confidence.

## Step 1 — Classify (explicit and overridable)

Classify from the **content** of the ticket — judge what the work actually entails, not any type label the user typed. A prefix like `bug:` is a hint at most, never authoritative: a ticket tagged "bug" that adds a new capability is a Feature, and one tagged "task" that needs a destructive migration escalates. Match the description against the signals below, then state your classification in one line and proceed; the user can correct it. When the content genuinely fits two types, ask. If Step 0 refined raw intent, classify the sharpened result — a broad goal typically lands as an Epic, a sharpened single idea as a Feature.

| Type | Signal |
|------|--------|
| Epic | Spans multiple shippable features/surfaces; "build an X system"; too big for one spec. |
| Feature | One net-new user-facing capability worth a spec; a single shippable unit. |
| Task | A small, well-defined slice of an already-specced feature; no spec of its own. |
| Bug | Something is broken, incorrect, or regressed; a reproducible defect (not currently a live outage). |
| Incident · hotfix | Production is broken or degraded right now; urgency dominates ("outage", "down", "P0/P1", "prod regression"). |
| Migration · deprecation | Removing, replacing, or sunsetting existing behavior/API/data — not adding or fixing ("deprecate", "migrate", "sunset", "remove X", "drop support for"). |
| Improvement · refactor | Change internal structure without changing behavior ("clean up", "simplify", "refactor"). |
| Improvement · perf | Make existing behavior faster/lighter ("slow", "optimize", "latency", "memory"). |
| Spike | Open question or research ("investigate", "explore", "prototype to learn"); throwaway. |
| Chore | Maintenance with no user-facing runtime change (deps bump, config, CI, tooling, version, formatting; docs-only counts here). |

## Step 2 — Set up the work

This port uses a flat, single-feature artifact model: the spec lives at `SPEC.md` (project root) and the plan at `tasks/plan.md` — keep one feature in flight at a time. Where your workflow uses branches, name them by type for clarity: Feature → `feature/<x>`, Task → `task/<x>`, Bug → `fix/<x>`, Incident → `hotfix/<x>`, Migration → `migrate/<x>`, Improvement (refactor) → `improve/<x>`, Improvement (perf) → `perf/<x>`, Spike → `spike/<x>` (throwaway), Chore → `chore/<x>`. Migration guides live at `docs/migrations/<name>.md` and incident runbooks at `docs/runbooks/<alert>.md`. For an Epic, handle each child feature as its own flat feature in turn.

## Step 3 — Dispatch the calibrated flow

Throughout, "verify" means: run the app and observe the changed runtime behavior — invoke the browser-testing-with-devtools skill for browser surfaces, otherwise smoke-test the app directly. It is distinct from `/test` (unit/integration tests) and from `/ship`'s static review fan-out. "ship-lite" means `/ship` with the persona fan-out auto-skipped — `/ship` already does this for small, low-blast-radius diffs (≤2 files, <50 lines, nothing touching auth, payments, data, or config). [HUMAN] marks a deliberate human gate.

- Epic — invoke the interview-me skill → write an intent doc to `docs/intent/<topic>.md` (reuse the intent doc if Step 0 already produced one — don't re-interview) → [HUMAN] approve the split into features → run the Feature flow below for each child feature in turn → finish with an integration verify across the assembled features. Skips: one mega spec/plan/ship.
- Feature — `/spec` ([HUMAN] confirm spec) → `/build auto` ([HUMAN] approve plan — the gate lives inside `build auto`) → verify if the ticket has runtime surface → `/ship` ([HUMAN] GO/NO-GO). Skips: `/planning` and `/test` — both run inside `/build auto`.
- Task — `/build` (single task) → verify if it has runtime surface. The child rides the parent feature's `/ship` (a standalone `task/<x>` ships itself, ship-lite). Skips: spec, plan, `/test`, full ship. No human gate unless an escalation trigger fires.
- Bug — reproduce with a failing test via the debugging-and-error-recovery skill / `/test` (Prove-It; the failing test is the spec) → fix → verify (always — a bug is an observable defect) → `/review` if the root cause is risky → `/ship` ([HUMAN] if the root cause was risky). Skips: spec, plan. Here `/test` is correct: the fix is hand-written and bypasses `/build`'s loop. (If it's live in production, route to Incident instead.)
- Incident · hotfix — calibration is inverted: stabilize first, process after. [HUMAN] Mitigate — stop the bleeding via rollback or feature flag before diagnosing → verify recovery against production signals → root-cause as a Bug (failing test → fix) on the `hotfix/<x>` branch → ship the fix ([HUMAN] expedited GO/NO-GO) → postmortem: write or update a runbook at `docs/runbooks/<alert>.md` via the observability-and-instrumentation skill and file follow-ups. Skips: spec, plan — speed first; the postmortem is mandatory, not optional.
- Migration · deprecation — write the migration/deprecation guide to `docs/migrations/<name>.md` via the deprecation-and-migration skill (the guide is the spec) → roll out in phases (deprecate → warn → remove) → [HUMAN] destructive/irreversible-step gate before any data migration, public-API removal, or dropped column (anything not `git revert`-able) → verify each phase → `/review` → `/ship` with the guide + a `CHANGELOG.md` entry and the deprecation timeline communicated. Skips: `/spec`, `/planning` for the mechanics.
- Improvement · refactor — ensure tests guard the current behavior first (add via `/test` if missing) → `/code-simplify` (it runs the test loop internally) → `/review` → ship-lite. Skips: spec, plan, a separate `/test` pass, and verify — unless the change turns out to alter behavior, in which case verify.
- Improvement · perf — capture a baseline measurement → invoke the performance-optimization skill (or `/webperf` for web surfaces) → verify the measured improvement (re-measure, don't assume) → `/review` → `/ship`. [HUMAN] if it touches a hot or risky path. Skips: spec, plan.
- Spike — [HUMAN] frame the scope/question → explore (throwaway code, don't merge) → write findings to `docs/ideas/<x>.md` via the idea-refine skill → [HUMAN] promote (re-enter as a Feature) or drop. Skips: tests, verify, review, ship.
- Chore — make the change → `/test` + build (hand-written change bypasses `/build`'s loop, so `/test` is the explicit gate) → smoke-verify only if it touches a runtime dependency or config → ship-lite. [HUMAN] if it touches secrets, CI, deploy, or config. Skips: spec, plan, review. (Docs-only chores: invoke the documentation-and-adrs skill and skip the test step.)

## Two calibration rules (why steps get skipped)

1. `/test` is redundant wherever a test loop already runs. `/build`, `/build auto`, and `/code-simplify` each run RED→GREEN (or revert-on-fail) internally. Call `/test` explicitly only when the work bypasses those loops — a hand-written bug fix, a chore, a legacy backfill.
2. "verify" is orthogonal to tests. Add it wherever the ticket changes observable runtime behavior, regardless of whether tests ran — and omit it when nothing observable changes (most refactors).

## Human-in-the-middle (critical gates only)

Run autonomously between steps. Stop for a human only at: the [HUMAN] gates above (spec confirm, plan approval inside `/build auto`, ship GO/NO-GO, Epic split, Spike frame/promote-drop, Incident mitigate-first, Migration destructive-step), and the standard escalation triggers — auth/permissions, payments, destructive migrations, deletions, deploys, secrets, anything not undoable with `git revert`, unfixable test/build failures, ambiguous specs, or Critical security/review findings (NO-GO by default). These are enforced by the doubt-driven-development skill and the escalation list in `/build`; don't re-derive them.

## Rules

1. Classification is a recommendation — always let the user override the type.
2. Never invent requirements. If a Feature/Epic ticket is too thin to classify or spec, ask before starting.
3. The router only dispatches; it does not duplicate skill logic. Each step's behavior lives in its command/skill.
4. When a ticket genuinely spans two types (e.g. a bug fix that also needs a perf pass), run the flows in sequence rather than forcing one box.
"""
